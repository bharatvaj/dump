<input type="text" class="form-control" type="text" [(ngModel)]="serverName">
<button [disabled]="!allowNewServer" (click)="onCreateServer()" class="btn btn-primary">
  Add Server</button>
<p *ngIf="serverCreated">Server was created, server name is {{ serverName }}</p>
<app-server *ngFor="let server of servers"></app-server>
